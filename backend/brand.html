<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="brandTitle">预约购买</title>
<style>
  :root {
    --bg: #0a0e17; --card-bg: #111827; --border: #1f2937;
    --text: #e5e7eb; --text-dim: #9ca3af; --accent: #00d4ff; 
    --accent-dim: rgba(0,212,255,.12); --accent-glow: rgba(0,212,255,.3);
    --danger: #ff5c6e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .header { text-align:center; padding:3rem 1rem 2rem; }
  .company-logo { max-width:180px; max-height:60px; margin-bottom:1rem; }
  .company-name { font-size:1.5rem; font-weight:700; color:var(--accent); }
  .subtitle { font-size:.85rem; color:var(--text-dim); margin-top:.5rem; }
  .container { max-width:860px; margin:0 auto; padding:0 1rem 3rem; display:flex; gap:2rem; flex-wrap:wrap; justify-content:center; }
  .card {
    flex:1; min-width:280px; max-width:400px; background:var(--card-bg);
    border:1px solid var(--border); border-radius:16px; padding:2rem;
    display:flex; flex-direction:column; align-items:center; text-align:center;
  }
  .card.pro { border-color:var(--accent); }
  .badge {
    font-size:.78rem; font-weight:700; padding:.25rem 1rem; border-radius:20px;
    background:var(--accent-dim); color:var(--accent); margin-bottom:1.2rem;
  }
  .badge.pro { background:var(--accent); color:#060b10; }
  .price-row { display:flex; align-items:baseline; gap:.5rem; margin-bottom:1.5rem; }
  .price-cn { font-size:1.8rem; font-weight:800; }
  .price-divider { color:var(--border); font-size:1.2rem; }
  .price-intl { font-size:1.2rem; font-weight:600; color:var(--text-dim); }
  .specs { width:100%; margin-bottom:1.5rem; }
  .spec { padding:.45rem 0; border-bottom:1px solid var(--border); font-size:.82rem; color:var(--text-dim); text-align:left; }
  .spec:last-child { border-bottom:none; }
  .btn {
    width:100%; padding:.75rem; border-radius:10px; border:none;
    font-size:.85rem; font-weight:700; cursor:pointer; background:var(--accent-dim); color:var(--accent);
    transition:all .2s;
  }
  .btn:hover { filter:brightness(1.2); }
  .btn.primary { background:var(--accent); color:#060b10; }
  .btn.ghost { background:transparent; border:1px solid var(--border); color:var(--text); }

  /* modal */
  .modal-overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; width:400px; max-width:90vw; overflow:hidden; }
  .modal-header { display:flex; justify-content:space-between; align-items:center; padding:1.2rem 1.5rem; border-bottom:1px solid var(--border); }
  .modal-header h3 { font-size:1rem; }
  .modal-close { background:none; border:none; font-size:1.4rem; color:var(--text-dim); cursor:pointer; }
  .modal-body { padding:1.5rem; }
  .form-group { margin-bottom:1rem; }
  .form-group label { display:block; font-size:.82rem; color:var(--text-dim); margin-bottom:.35rem; }
  .form-group input { width:100%; padding:.65rem .8rem; border-radius:8px; border:1px solid var(--border); background:#0d1117; color:var(--text); font-size:.85rem; }
  .form-group input:focus { outline:none; border-color:var(--accent); }
  .success { padding:2.5rem 1.5rem; text-align:center; display:none; }
  .success .check { font-size:2.5rem; color:var(--accent); }
  .success .msg { font-size:1rem; font-weight:700; color:var(--accent); margin-top:.8rem; }
  .footer { text-align:center; padding:2rem; font-size:.72rem; color:var(--text-dim); }
</style>
</head>
<body>
<div class="header">
  <img class="company-logo" id="logoImg" src="" alt="" style="display:none;">
  <div class="company-name" id="companyName">---</div>
  <div class="subtitle">VEILORA 安全手机经销商预约</div>
</div>
<div class="container" id="cards">
  <!-- JS 动态填充 -->
</div>
<div class="footer">Powered by VEILORA &copy; 2026</div>

<!-- 弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">预约购买</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="form-group"><label>姓名</label><input type="text" id="reserveName" placeholder="请输入姓名"></div>
      <div class="form-group"><label>手机号</label><input type="text" id="reservePhone" placeholder="请输入手机号"></div>
      <div class="form-group"><label>邮箱（选填）</label><input type="email" id="reserveEmail" placeholder="请输入邮箱"></div>
      <button class="btn primary" onclick="submitReserve()" style="width:100%;margin-top:.5rem;">提交预约</button>
    </div>
    <div class="success" id="successBlock">
      <div class="check">&#10003;</div>
      <div class="msg">预约已提交</div>
      <p style="font-size:.82rem;color:var(--text-dim);margin-top:.3rem;">我们将在产品上市后第一时间通知您</p>
      <button class="btn ghost" onclick="closeModal()" style="margin-top:1.5rem;">关闭</button>
    </div>
  </div>
</div>

<script>
const DEALER_ID = window.location.pathname.split('/').pop();
let currentEdition = 'standard';

async function loadBrand() {
  try {
    const res = await fetch(`/api/brand/${DEALER_ID}`);
    const data = await res.json();
    if (data.error) { document.getElementById('companyName').textContent = '经销商不存在'; return; }
    
    document.getElementById('companyName').textContent = data.company_name || 'VEILORA 授权经销商';
    document.title = data.company_name + ' - 预约购买';
    
    if (data.logo_url) {
      const logo = document.getElementById('logoImg');
      logo.src = data.logo_url;
      logo.style.display = 'block';
    }
    
    renderCards(data);
  } catch(e) {
    document.getElementById('companyName').textContent = '加载失败，请检查网络';
  }
}

function renderCards(data) {
  const specs = {
    standard: ['VEILORA OS 3.0', '安全芯片 SE-200', '6.7" AMOLED', '16GB + 128GB', '基础安全套件'],
    pro: ['VEILORA OS 3.0 Pro', '安全芯片 SE-300', '6.9" LTPO AMOLED', '16GB + 512GB', '高级安全套件 + 应急保护']
  };
  
  document.getElementById('cards').innerHTML = `
    <div class="card">
      <div class="badge">标准版</div>
      <div class="price-row">
        <span class="price-cn">¥${(data.price_standard_cn||12888).toLocaleString()}</span>
        <span class="price-divider">|</span>
        <span class="price-intl">$${(data.price_standard_intl||2300).toLocaleString()}</span>
      </div>
      <div class="specs">${specs.standard.map(s => `<div class="spec">${s}</div>`).join('')}</div>
      <button class="btn" onclick="openModal('standard')">预约标准版</button>
    </div>
    <div class="card pro">
      <div class="badge pro">专业版</div>
      <div class="price-row">
        <span class="price-cn">¥${(data.price_pro_cn||15888).toLocaleString()}</span>
        <span class="price-divider">|</span>
        <span class="price-intl">$${(data.price_pro_intl||2868).toLocaleString()}</span>
      </div>
      <div class="specs">${specs.pro.map(s => `<div class="spec">${s}</div>`).join('')}</div>
      <button class="btn primary" onclick="openModal('pro')">预约专业版</button>
    </div>`;
}

function openModal(edition) {
  currentEdition = edition;
  document.getElementById('modalTitle').textContent = edition === 'standard' ? '预约 VEILORA 标准版' : '预约 VEILORA 专业版';
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('modalBody').style.display = 'block';
  document.getElementById('successBlock').style.display = 'none';
  ['reserveName','reservePhone','reserveEmail'].forEach(id => document.getElementById(id).value = '');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function submitReserve() {
  const name = document.getElementById('reserveName').value.trim();
  const phone = document.getElementById('reservePhone').value.trim();
  const email = document.getElementById('reserveEmail').value.trim();
  if (!name || !phone) { alert('请填写姓名和手机号'); return; }
  
  fetch('/api/leads', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ dealer_id: parseInt(DEALER_ID), edition: currentEdition, name, phone, email })
  }).then(r => r.json()).then(() => {
    document.getElementById('modalBody').style.display = 'none';
    document.getElementById('successBlock').style.display = 'block';
  }).catch(() => {
    document.getElementById('modalBody').style.display = 'none';
    document.getElementById('successBlock').style.display = 'block';
  });
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadBrand();
</script>
</body>
</html>
